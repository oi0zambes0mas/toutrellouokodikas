<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🕌 Qibla Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080e06;
  --deep: #0c140a;
  --surface: #101a0d;
  --card: #162010;
  --border: #1e3a1a;
  --gold: #d4b800;
  --gold-bright: #f0d800;
  --gold-dim: #8a7800;
  --emerald: #4caf50;
  --emerald-dim: #1b5e20;
  --ink: #e8f0e4;
  --dust: #6a8a64;
  --shadow: #1e3a1a;
  --mono: 'JetBrains Mono', monospace;
  --serif: 'Cormorant Garamond', serif;
  --display: 'Cinzel', serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  min-height:100%; background:var(--bg); color:var(--ink);
  font-family:var(--display); display:flex; flex-direction:column;
}
body::before {
  content:''; position:fixed; inset:0; pointer-events:none;
  background:radial-gradient(ellipse 70% 50% at 50% 0%, rgba(76,175,80,0.08) 0%, transparent 65%);
}

/* HEADER */
.header {
  position:relative; z-index:1;
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 28px; border-bottom:1px solid var(--border);
  background:var(--deep); flex-shrink:0;
}
.header::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,transparent,var(--emerald-dim),var(--emerald),var(--gold),var(--emerald),var(--emerald-dim),transparent);
}
.logo { display:flex; align-items:center; gap:12px; }
.logo-icon { font-size:26px; }
.logo-title { font-size:16px; font-weight:700; letter-spacing:0.18em; color:var(--gold); }
.logo-sub { font-size:10px; letter-spacing:0.1em; color:var(--dust); margin-top:3px; font-style:italic; font-family:var(--serif); }
.back-btn {
  background:none; border:1px solid var(--border); color:var(--dust);
  font-family:var(--display); font-size:10px; letter-spacing:0.1em;
  text-transform:uppercase; padding:7px 14px; border-radius:3px; cursor:pointer;
  transition:all 0.15s;
}
.back-btn:hover { border-color:var(--emerald); color:var(--emerald); }

/* MAIN */
.main {
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:32px 20px; position:relative; z-index:1;
  gap:28px;
}

/* COMPASS */
.compass-wrap {
  position:relative; width:260px; height:260px;
}
.compass-ring {
  position:absolute; inset:0; border-radius:50%;
  border:2px solid var(--border);
  background:radial-gradient(circle at 40% 35%, #162010, #080e06);
  box-shadow:0 0 40px rgba(76,175,80,0.08), inset 0 0 30px rgba(0,0,0,0.5);
}
/* Tick marks */
.compass-ring::before {
  content:''; position:absolute; inset:8px; border-radius:50%;
  border:1px solid rgba(76,175,80,0.15);
}
.compass-ring::after {
  content:''; position:absolute; inset:16px; border-radius:50%;
  border:1px solid rgba(76,175,80,0.08);
}
.cardinal {
  position:absolute; font-size:13px; font-weight:700; letter-spacing:0.1em;
  color:var(--dust);
}
.cardinal.n { top:8px; left:50%; transform:translateX(-50%); color:var(--emerald); }
.cardinal.s { bottom:8px; left:50%; transform:translateX(-50%); }
.cardinal.w { left:10px; top:50%; transform:translateY(-50%); }
.cardinal.e { right:10px; top:50%; transform:translateY(-50%); }

.needle-wrap {
  position:absolute; top:50%; left:50%;
  transform-origin:0 0;
  transition:transform 1s cubic-bezier(0.34,1.56,0.64,1);
}
.needle {
  position:absolute;
  width:4px; height:100px;
  margin-left:-2px; margin-top:-90px;
  background:linear-gradient(to bottom, var(--gold-bright) 0%, var(--gold) 60%, transparent 100%);
  border-radius:2px 2px 0 0;
}
.needle-tail {
  position:absolute;
  width:4px; height:30px;
  margin-left:-2px; margin-top:4px;
  background:linear-gradient(to bottom, transparent, var(--dust));
  border-radius:0 0 2px 2px;
  opacity:0.4;
}
.kaaba-tip {
  position:absolute;
  font-size:20px;
  margin-left:-10px; margin-top:-112px;
  transition:transform 1s cubic-bezier(0.34,1.56,0.64,1);
}
.compass-center {
  position:absolute; top:50%; left:50%;
  width:14px; height:14px; border-radius:50%;
  background:var(--emerald); transform:translate(-50%,-50%);
  box-shadow:0 0 12px rgba(76,175,80,0.6);
  border:2px solid var(--deep);
}

/* INFO CARD */
.info-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:10px; padding:24px 32px; text-align:center;
  min-width:280px; max-width:400px; width:100%;
}
.info-status {
  font-family:var(--mono); font-size:12px; color:var(--dust);
  line-height:1.6;
}
.info-bearing {
  font-size:36px; font-weight:700; color:var(--gold);
  letter-spacing:0.06em; margin-bottom:6px;
}
.info-dist {
  font-family:var(--mono); font-size:12px; color:var(--dust);
  margin-bottom:16px;
}
.info-coords {
  font-family:var(--mono); font-size:11px; color:var(--shadow);
}
.info-note {
  font-family:var(--serif); font-style:italic;
  font-size:13px; color:var(--dust); line-height:1.7;
  border-top:1px solid var(--border); padding-top:14px; margin-top:14px;
}

.locate-btn {
  background:linear-gradient(135deg, var(--emerald-dim), var(--emerald));
  color:#080e06; border:none; border-radius:6px;
  padding:12px 32px; font-family:var(--display); font-size:12px;
  font-weight:700; letter-spacing:0.14em; text-transform:uppercase;
  cursor:pointer; transition:all 0.2s; margin-top:8px;
}
.locate-btn:hover { box-shadow:0 4px 20px rgba(76,175,80,0.4); transform:translateY(-1px); }

/* Prayer times note */
.ayah {
  max-width:400px; text-align:center;
  font-family:var(--serif); font-style:italic;
  font-size:14px; color:var(--dust); line-height:1.8;
  padding:0 20px;
}

@media(max-width:500px) {
  .compass-wrap { width:220px; height:220px; }
  .needle { height:80px; margin-top:-72px; }
  .kaaba-tip { margin-top:-94px; }
  .info-card { padding:18px 20px; }
  .info-bearing { font-size:28px; }
}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-icon">🕌</div>
    <div>
      <div class="logo-title">Qibla Finder</div>
      <div class="logo-sub">Direction of the Kaaba — Mecca</div>
    </div>
  </div>
  <button class="back-btn" onclick="history.back()">← Back</button>
</header>

<div class="main">

  <div class="compass-wrap" id="compassWrap">
    <div class="compass-ring"></div>
    <div class="cardinal n">N</div>
    <div class="cardinal s">S</div>
    <div class="cardinal w">W</div>
    <div class="cardinal e">E</div>
    <div class="needle-wrap" id="needleWrap" style="transform:rotate(0deg)">
      <div class="needle"></div>
      <div class="needle-tail"></div>
      <div class="kaaba-tip">🕋</div>
    </div>
    <div class="compass-center"></div>
  </div>

  <div class="info-card" id="infoCard">
    <div class="info-status" id="status">Press the button below to find your Qibla direction.</div>
    <div id="result" style="display:none;">
      <div class="info-bearing" id="bearing">—</div>
      <div class="info-dist" id="dist">—</div>
      <div class="info-coords" id="coords">—</div>
      <div class="info-note">Face the 🕋 direction when praying.<br>May your prayers be accepted.</div>
    </div>
    <button class="locate-btn" onclick="findQibla()">📍 Find My Qibla</button>
  </div>

  <div class="ayah">
    "So turn your face toward al-Masjid al-Haram. And wherever you are, turn your faces toward it."<br>
    <span style="font-size:12px;color:var(--shadow);">— Quran 2:144</span>
  </div>

</div>

<script>
function findQibla() {
  document.getElementById('status').textContent = 'Locating you...';
  document.getElementById('result').style.display = 'none';

  if (!navigator.geolocation) {
    document.getElementById('status').textContent = 'Geolocation is not supported by your browser.';
    return;
  }

  navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    // Kaaba coordinates
    const mLat = 21.4225;
    const mLng = 39.8262;

    // Bearing calculation
    const dLng = (mLng - lng) * Math.PI / 180;
    const lat1 = lat * Math.PI / 180;
    const lat2 = mLat * Math.PI / 180;
    const y = Math.sin(dLng) * Math.cos(lat2);
    const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLng);
    let bearing = Math.atan2(y, x) * 180 / Math.PI;
    bearing = (bearing + 360) % 360;

    // Distance (Haversine)
    const R = 6371;
    const dLat = (mLat - lat) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin((mLng-lng)*Math.PI/180/2)**2;
    const dist = Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));

    // Rotate needle
    document.getElementById('needleWrap').style.transform = `rotate(${bearing}deg)`;

    // Show info
    document.getElementById('status').textContent = '';
    document.getElementById('result').style.display = 'block';
    document.getElementById('bearing').textContent = Math.round(bearing) + '° from North';
    document.getElementById('dist').textContent = dist.toLocaleString() + ' km from the Kaaba';
    document.getElementById('coords').textContent = `Your location: ${lat.toFixed(4)}°, ${lng.toFixed(4)}°`;

  }, err => {
    const msgs = {1:'Location access denied. Please allow it in your browser.', 2:'Location unavailable.', 3:'Location request timed out.'};
    document.getElementById('status').textContent = msgs[err.code] || 'Could not get location.';
  }, { timeout: 10000 });
}
</script>
</body>
</html>
